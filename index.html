<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fluxo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Albert+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:#96aca0;--sage-bright:#a9c1b4;--sage-d:#6f857a;
    --bg:#0c0f0e;--bg-2:#101413;
    --surface:rgba(255,255,255,0.028);--surface-2:rgba(255,255,255,0.05);
    --glass:rgba(20,26,24,0.55);
    --line:rgba(255,255,255,0.07);--line-2:rgba(255,255,255,0.12);
    --text:#edf2ef;--text-2:#9fb0a8;--muted:#647069;
    --pos:#8fb39f;--neg:#cf9488;--warn:#cdbb83;
    --green:#7fa890;--yellow:#cdbb83;--red:#cf9488;
    --serif:"Instrument Serif",Georgia,"Times New Roman",serif;--mono:"JetBrains Mono",ui-monospace,monospace;--sans:"Albert Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);position:relative;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1;}

  #mesh{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .app{position:relative;z-index:2;height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;padding:18px;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 0;}
  .brand{font-family:var(--serif);font-size:21px;font-weight:400;letter-spacing:.2px;font-style:italic;}
  .icon-btn{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line);transition:.15s;backdrop-filter:blur(8px);}
  .icon-btn:active{transform:scale(.93);background:var(--surface-2);}
  .icon-btn svg{width:19px;height:19px;stroke:var(--text-2);fill:none;stroke-width:1.6;}

  .pills{display:flex;justify-content:center;gap:18px;margin:26px 0 0;}
  .pill{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .pill .pl{font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);}
  .pill .pv{font-family:var(--mono);font-size:14px;font-weight:500;}
  .pv.pos{color:var(--pos);}.pv.neg{color:var(--neg);}
  .pill-sep{width:1px;height:30px;background:var(--line);align-self:center;}

  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .card{width:100%;background:var(--glass);border:1px solid var(--line);border-radius:26px;backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);padding:30px 22px 22px;box-shadow:0 20px 60px -20px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);}
  .card .clab{text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .amount-wrap{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:18px;}
  .amount-wrap .cur{font-family:var(--serif);font-size:22px;color:var(--text-2);font-style:italic;}
  #bigInput{width:auto;max-width:100%;text-align:center;background:none;border:none;outline:none;color:var(--text);font-family:var(--serif);font-size:60px;font-weight:400;letter-spacing:-1px;padding:0;line-height:1;field-sizing:content;min-width:1ch;}
  #bigInput::placeholder{color:var(--line-2);}

  .control{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--surface);}
  .control-head{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;transition:.15s;}
  .control-head:active{background:var(--surface-2);}
  .control-head .ch-left{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-2);}
  .control-head .ch-left svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.7;}
  .control-head .chev{transition:transform .25s;stroke:var(--muted);width:15px;height:15px;fill:none;stroke-width:2;}
  .control-head.open .chev{transform:rotate(180deg);}
  .control-body{max-height:0;overflow:hidden;transition:max-height .3s ease;border-top:1px solid transparent;}
  .control-body.open{max-height:320px;border-top-color:var(--line);}
  .cb-inner{padding:12px;}
  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .cat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 3px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.12s;}
  .cat svg{width:19px;height:19px;stroke:var(--text-2);fill:none;stroke-width:1.6;}
  .cat .cn{font-size:9px;color:var(--muted);text-align:center;}
  .cat.sel{border-color:var(--sage);background:var(--surface-2);}
  .cat.sel svg{stroke:var(--sage);}.cat.sel .cn{color:var(--text);}
  .desc-input{width:100%;margin-top:9px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 13px;color:var(--text);font-size:13px;outline:none;font-family:var(--sans);}
  .desc-input:focus{border-color:var(--line-2);}
  .submit{width:100%;margin-top:14px;background:var(--sage);color:#0c0f0e;border-radius:15px;padding:16px;font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:.2px;transition:.12s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .submit:active{transform:scale(.98);background:var(--sage-d);}
  .submit svg{width:17px;height:17px;stroke:#0c0f0e;fill:none;stroke-width:2.2;}

  .fab{position:fixed;right:20px;bottom:20px;z-index:30;width:52px;height:52px;border-radius:50%;background:var(--glass);border:1px solid var(--line-2);display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.5);backdrop-filter:blur(12px);transition:.15s;}
  .fab:active{transform:scale(.92);}
  .fab svg{width:20px;height:20px;stroke:var(--text-2);fill:none;stroke-width:1.7;}
  .sheet-backdrop{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.2s;}
  .sheet-backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--bg-2);border-top-left-radius:24px;border-top-right-radius:24px;border-top:1px solid var(--line);padding:10px 18px calc(28px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .28s cubic-bezier(.3,.9,.3,1);max-width:560px;margin:0 auto;}
  .sheet.open{transform:translateY(0);}
  .sheet .grab{width:38px;height:4px;border-radius:4px;background:var(--line-2);margin:6px auto 16px;}
  .sheet h3{font-family:var(--serif);font-size:15px;color:var(--text-2);margin-bottom:12px;text-align:center;font-style:italic;}
  .sheet-row{display:flex;align-items:center;gap:14px;padding:15px 16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;font-size:14px;}
  .sheet-row:active{background:var(--surface-2);}
  .sheet-row svg{width:19px;height:19px;stroke:var(--text-2);fill:none;stroke-width:1.7;}
  .sheet-row.danger,.sheet-row.danger svg{color:var(--neg);stroke:var(--neg);}

  .ov-backdrop{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.74);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:.22s;}
  .ov-backdrop.open{opacity:1;pointer-events:auto;}
  .panel{position:fixed;top:24px;bottom:24px;left:24px;right:24px;z-index:51;background:var(--bg-2);border:1px solid var(--line-2);border-radius:28px;display:flex;flex-direction:column;overflow:hidden;transform-origin:top right;opacity:0;pointer-events:none;box-shadow:0 30px 80px -20px rgba(0,0,0,.8);transition:transform .4s cubic-bezier(.32,.72,0,1),opacity .26s ease,border-radius .4s cubic-bezier(.32,.72,0,1);will-change:transform,opacity;}
  @media (min-width:768px){
    .panel{left:max(24px,calc(50% - 360px));right:max(24px,calc(50% - 360px));transform-origin:center;}
  }
  .panel.open{pointer-events:auto;}
  .panel-inner{height:100%;display:flex;flex-direction:column;opacity:0;transition:opacity .26s ease .12s;}
  .panel-top{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 14px;}
  .panel-title{font-family:var(--serif);font-size:24px;font-weight:400;letter-spacing:.2px;}
  .panel-title .yr{font-style:italic;color:var(--text-2);}
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;}
  .seg button{padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--muted);transition:.15s;font-family:var(--sans);}
  .seg button.active{background:var(--surface-2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .panel-scroll{flex:1;overflow-y:auto;padding:0 24px 30px;-webkit-overflow-scrolling:touch;}
  .scope-row{display:flex;align-items:center;justify-content:space-between;padding:2px 24px 14px;}
  .scope-nav{display:flex;align-items:center;gap:4px;}
  .scope-nav button{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-2);background:var(--surface);border:1px solid var(--line);}
  .scope-nav button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
  .scope-label{font-size:13px;color:var(--text-2);min-width:96px;text-align:center;font-weight:500;}

  .hero{padding:4px 0 18px;border-bottom:1px solid var(--line);margin-bottom:6px;}
  .hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;}
  .hero-cell .hl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .hero-cell .hv{font-family:var(--serif);font-size:32px;font-weight:400;line-height:1;letter-spacing:-.5px;}
  .hero-cell .hv .u{font-size:15px;color:var(--text-2);font-style:italic;margin-left:2px;}
  .hero-cell .hs{font-size:11px;color:var(--text-2);margin-top:5px;}
  .hero-main{grid-column:1/3;margin-bottom:8px;}
  .hero-main .hv{font-size:46px;}
  .pace-track{height:6px;border-radius:4px;background:var(--surface-2);margin-top:11px;overflow:hidden;position:relative;}
  .pace-fill{height:100%;border-radius:4px;transition:width .5s,background .5s;}
  .pace-marker{position:absolute;top:-3px;width:2px;height:12px;background:var(--text-2);opacity:.55;}

  .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:24px 0 12px;}
  .sec-h .st{font-family:var(--serif);font-size:17px;font-weight:400;}
  .sec-h .sx{font-size:11px;color:var(--muted);}
  .seg-mini{display:inline-flex;gap:1px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:2px;}
  .seg-mini button{padding:4px 9px;border-radius:6px;font-size:10.5px;color:var(--muted);font-family:var(--sans);}
  .seg-mini button.active{background:var(--surface-2);color:var(--text);}

  .rank-row{margin-bottom:13px;}
  .rank-line{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;}
  .rank-name{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
  .rank-name .ri{width:16px;height:16px;display:grid;place-items:center;}
  .rank-name .ri svg{width:15px;height:15px;stroke:var(--text-2);fill:none;stroke-width:1.6;}
  .rank-val{font-family:var(--mono);font-size:12.5px;color:var(--text-2);}
  .rank-val .pct{color:var(--muted);font-size:11px;margin-left:6px;}
  .rank-track{height:7px;border-radius:5px;background:var(--surface-2);overflow:hidden;}
  .rank-bar{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.3,.8,.3,1);background:var(--sage-d);}
  .rank-row.top .rank-bar{background:linear-gradient(90deg,var(--sage-bright),var(--sage));}
  .rank-delta{font-size:10.5px;margin-left:7px;font-family:var(--mono);}
  .rank-delta.up{color:var(--neg);}.rank-delta.down{color:var(--green);}

  .summary{display:flex;align-items:center;gap:18px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 18px;}
  .summary-txt .stt{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
  .summary-txt .sv{font-family:var(--serif);font-size:28px;line-height:1.1;margin-top:2px;}
  .summary-txt .ss{font-size:11.5px;color:var(--text-2);margin-top:5px;}

  .heat{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px;}
  .heat-cell{aspect-ratio:1;border-radius:5px;background:var(--surface-2);position:relative;display:grid;place-items:center;}
  .heat-cell.has{cursor:pointer;transition:transform .12s,outline .12s;}
  .heat-cell.has:active{transform:scale(.9);}
  .heat-cell.sel{outline:2px solid var(--sage-bright);outline-offset:1px;}
  .heat-cell .hc-d{font-size:8.5px;color:rgba(255,255,255,.45);font-family:var(--mono);}
  .heat-cell.has .hc-d{color:rgba(255,255,255,.8);}
  /* reserve */
  .reserve{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;}
  .reserve-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .reserve-top .rt-l{font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
  .reserve-top .rt-v{font-family:var(--serif);font-size:24px;line-height:1.1;margin-top:3px;}
  .reserve-top .rt-s{font-size:10.5px;color:var(--text-2);margin-top:2px;}
  .reserve-chart{width:100%;height:120px;display:block;margin:4px 0;}
  .reserve-foot{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:11px;margin-top:4px;}
  .rf-cell{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;}
  .rf-cell .rf-n{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);}
  .rf-cell .rf-l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  /* day detail */
  .day-detail{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;}
  .dd-head{font-family:var(--serif);font-size:15px;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
  .dd-head .dd-tot{font-family:var(--mono);font-size:11px;color:var(--neg);font-weight:500;}
  .dd-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid var(--line);}
  .dd-row:first-of-type{border-top:none;}
  .dd-cat{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--text);}
  .dd-cat svg{width:15px;height:15px;stroke:var(--text-2);fill:none;stroke-width:1.6;}
  .dd-amt{font-family:var(--mono);font-size:12.5px;font-weight:500;}
  .dd-amt.neg{color:var(--neg);}.dd-amt.pos{color:var(--pos);}
  .heat-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px;}
  .heat-dow span{font-size:9px;color:var(--muted);text-align:center;}
  .heat-legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:9px;font-size:10px;color:var(--muted);}
  .heat-legend .sc{display:flex;gap:3px;}
  .heat-legend .sc i{width:11px;height:11px;border-radius:3px;display:block;}

  .trend{display:flex;align-items:flex-end;gap:4px;height:110px;margin-top:8px;}
  .tcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;}
  .tcol .tb-wrap{width:100%;display:flex;gap:2px;align-items:flex-end;height:100%;}
  .tb{flex:1;border-radius:3px 3px 1px 1px;min-height:2px;transition:height .5s;}
  .tcol .tl{font-size:8.5px;color:var(--muted);}
  .tcol.cur .tl{color:var(--text);font-weight:600;}

  .sheet-table{width:100%;border-collapse:collapse;}
  .sheet-table th{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:9px 7px;text-align:right;font-weight:600;position:sticky;top:0;background:var(--bg-2);}
  .sheet-table th:first-child{text-align:left;}
  .sheet-table td{padding:11px 7px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;}
  .sheet-table td:first-child{text-align:left;font-family:var(--sans);font-weight:500;color:var(--text-2);}
  .tint-green{background:rgba(127,168,144,.13);}.tint-yellow{background:rgba(205,187,131,.12);}.tint-red{background:rgba(207,148,136,.12);}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:6px;}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-family:var(--serif);font-style:italic;font-size:16px;}

  .set-field{margin-bottom:20px;}
  .set-field .lh{font-family:var(--serif);font-size:16px;color:var(--text);margin-bottom:10px;}
  .set-field input[type=number]{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--text);font-family:var(--mono);font-size:16px;font-weight:500;outline:none;}
  .set-field input:focus{border-color:var(--sage);}
  .slider-row{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
  .slider-row .sn{font-size:12px;color:var(--text-2);width:140px;display:flex;align-items:center;gap:7px;}
  .slider-row .sn svg{width:15px;height:15px;stroke:var(--sage);fill:none;stroke-width:1.7;}
  .slider-row input[type=range]{flex:1;accent-color:var(--sage);}
  .slider-row .sval{font-family:var(--mono);font-size:12.5px;width:50px;text-align:right;}
  .meta-warn{font-size:11.5px;padding:9px 12px;border-radius:10px;margin:5px 0 14px;line-height:1.45;}
  .meta-warn.ok{background:rgba(127,168,144,.1);color:var(--green);}
  .meta-warn.warn{background:rgba(205,187,131,.1);color:var(--yellow);}
  .meta-warn.bad{background:rgba(207,148,136,.1);color:var(--red);}
  .sum-pill{text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:14px;}
  input[type=file]{display:none;}
  .flash{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:60;background:var(--sage);color:#0c0f0e;padding:9px 18px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;}
  .flash.show{opacity:1;}
  .ms{font-size:11.5px;color:var(--text-2);line-height:1.5;}
</style>
</head>
<body>
<canvas id="mesh"></canvas>

<div class="app">
  <div class="topbar">
    <button class="icon-btn" id="openDash" aria-label="Painel"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></button>
    <div class="brand">Fluxo</div>
    <button class="icon-btn" id="openSettings" aria-label="Ajustes"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
  </div>

  <div class="pills">
    <div class="pill"><span class="pl">Entrou</span><span class="pv pos mono" id="pillIn">0</span></div>
    <div class="pill-sep"></div>
    <div class="pill"><span class="pl">Saiu</span><span class="pv neg mono" id="pillOut">0</span></div>
    <div class="pill-sep"></div>
    <div class="pill"><span class="pl">Saldo do mês</span><span class="pv mono" id="pillNet">0</span></div>
  </div>

  <div class="center">

      <div class="clab">Novo lançamento</div>

      <div class="control">

          <span class="ch-left"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg><span id="controlLabel">Categoria e descrição</span></span>
          <svg class="chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>

        </div></div>

  <div class="sheet-row" id="exportCsvBtn"><svg viewBox="0 0 24 24"><path d="M4 3h10l6 6v12a0 0 0 010 0H4a0 0 0 010 0V3z"/><path d="M14 3v6h6"/><path d="M8 13h8M8 17h8"/></svg>Exportar para planilha (.csv)</div>
  <div class="sheet-row" id="importBtn"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>Importar backup (.json)</div>
  <div class="sheet-row danger" id="resetBtn"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>Limpar ano</div>

  <div class="panel-inner">

        <button id="scopeNext"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>

<div class="flash" id="flash">salvo</div>

<script>
(function(){
  "use strict";
  const MONTHS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const MONTHS_FULL=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const DOW=["D","S","T","Q","Q","S","S"];
  const PFX="fluxo_v3_";const SET_KEY="fluxo_settings_v3";

  const CATS=[
    {id:"mercado",name:"Mercado",icon:'<path d="M3 3h2l2 13h11l2-8H6"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/>',group:"Essenciais"},
    {id:"graduacao",name:"Graduação",icon:'<path d="M2 8l10-4 10 4-10 4z"/><path d="M6 10v5c0 1 3 2 6 2s6-1 6-2v-5"/>',group:"Investimentos"},
    {id:"pets",name:"Pets",icon:'<circle cx="6.5" cy="10" r="1.6"/><circle cx="10.5" cy="6.5" r="1.6"/><circle cx="14.5" cy="6.5" r="1.6"/><circle cx="18" cy="10" r="1.6"/><path d="M8 16c0-2.5 2-4 4-4s4 1.5 4 4-2 3-4 3-4-.5-4-3z"/>',group:"Essenciais"},
    {id:"lazer",name:"Lazer",icon:'<path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/>',group:"Desejos"},
    {id:"reserva",name:"Reserva",icon:'<path d="M3 7h18v12H3z"/><path d="M3 7l9-4 9 4"/><circle cx="12" cy="13" r="2"/>',group:"Investimentos"},
    {id:"invest",name:"Invest.",icon:'<path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/>',group:"Investimentos"},
    {id:"imposto",name:"Imposto",icon:'<path d="M9 7h6M9 11h6M9 15h4"/><path d="M5 3h14v18l-3-2-2 2-2-2-2 2-2-2-3 2z"/>',group:"Empresa"},
    {id:"renda",name:"Renda",icon:'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 010 3h-3a1.5 1.5 0 000 3h4"/>',group:"Renda"},
    {id:"contas",name:"Contas",icon:'<path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/>',group:"Essenciais"},
    {id:"transporte",name:"Transporte",icon:'<path d="M5 11l1.5-5h11L19 11"/><path d="M3 11h18v6H3z"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/>',group:"Essenciais"},
    {id:"saude",name:"Saúde",icon:'<path d="M12 21s-7-4.5-7-10a4 4 0 017-2 4 4 0 017 2c0 5.5-7 10-7 10z"/>',group:"Essenciais"},
    {id:"outros",name:"Outros",icon:'<circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/>',group:"Desejos"}
  ];
  function catById(id){return CATS.find(c=>c.id===id);}

  let year=new Date().getFullYear();
  let data={};
  let settings={salary:7000,essenciais:50,desejos:20,investimentos:30,dotSpacing:22,dotSize:1.6,dotOpacity:0.34,waveIntensity:9,waveRadius:230,noise:0.05};
  let selCat="";let scope="month";let scopeMonth=new Date().getMonth();let rankMode="cat";

  function load(){try{const r=localStorage.getItem(PFX+year);data=r?JSON.parse(r):{};}catch(e){data={};}try{const s=localStorage.getItem(SET_KEY);if(s)settings=Object.assign(settings,JSON.parse(s));}catch(e){}}
  function save(){try{localStorage.setItem(PFX+year,JSON.stringify(data));flash();}catch(e){alert("Salvamento bloqueado aqui. Baixe o arquivo e abra no seu navegador para salvar de verdade.");}}
  function saveSettings(){try{localStorage.setItem(SET_KEY,JSON.stringify(settings));}catch(e){}}
  let ft;function flash(m){const f=document.getElementById("flash");if(m)f.textContent=m;f.classList.add("show");clearTimeout(ft);ft=setTimeout(()=>f.classList.remove("show"),900);}

  function fmt(n){const s=Math.abs(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});return (n<0?"−":"")+"R$ "+s;}
  function fmtShort(n){const a=Math.abs(n);let s;if(a>=1000)s="R$ "+(a/1000).toLocaleString("pt-BR",{maximumFractionDigits:1})+"k";else s="R$ "+a.toLocaleString("pt-BR",{maximumFractionDigits:0});return (n<0?"−":"")+s;}
  function fmtNum(n){return (n<0?"−":"")+Math.abs(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
  function key(y,m,d){return y+"-"+m+"-"+d;}
  function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function daysInMonth(m){return new Date(year,m+1,0).getDate();}
  function daysInYear(y){return ((y%4===0&&y%100!==0)||y%400===0)?366:365;}

  function addEntry(){
    const el=document.getElementById("bigInput");
    let raw=String(el.value).replace(/\s/g,"").replace(/\./g,"").replace(",",".");
    let v=parseFloat(raw);if(isNaN(v)||v===0){el.focus();return;}
    const t=new Date();const y=t.getFullYear(),m=t.getMonth(),d=t.getDate();
    if(y!==year){year=y;load();}
    const k=key(y,m,d);if(!data[k])data[k]=[];
    data[k].push({id:uid(),amount:Math.abs(v),type:v<0?"out":"in",cat:selCat,desc:document.getElementById("descInput").value.trim()});
    save();triggerWave(v<0?"out":"in");
    el.value="";document.getElementById("descInput").value="";selCat="";renderCats();
    document.getElementById("controlHead").classList.remove("open");document.getElementById("controlBody").classList.remove("open");
    document.getElementById("controlLabel").textContent="Categoria e descrição";
    renderPills();el.focus();
  }
  function delEntry(k,id){if(!data[k])return;data[k]=data[k].filter(e=>e.id!==id);if(!data[k].length)delete data[k];save();renderPills();renderDashboard();}

  function entriesIn(fn){const out=[];for(const k in data){const p=k.split("-").map(Number);if(fn(p[0],p[1],p[2]))data[k].forEach(e=>out.push(Object.assign({_y:p[0],_m:p[1],_d:p[2]},e)));}return out;}
  function aggregate(list){let inc=0,exp=0;const byCat={},byGroup={};list.forEach(e=>{if(e.type==="in")inc+=e.amount;else{exp+=e.amount;const c=catById(e.cat);const cid=e.cat||"outros";byCat[cid]=(byCat[cid]||0)+e.amount;const g=(c&&c.group)||"Outros";byGroup[g]=(byGroup[g]||0)+e.amount;}});return {inc,exp,net:inc-exp,byCat,byGroup};}
  function scopeData(){return scope==="year"?aggregate(entriesIn(y=>y===year)):aggregate(entriesIn((y,m)=>y===year&&m===scopeMonth));}
  function prevScopeData(){if(scope==="year")return aggregate(entriesIn(y=>y===year-1));const pm=scopeMonth-1;if(pm<0)return aggregate(entriesIn((y,m)=>y===year-1&&m===11));return aggregate(entriesIn((y,m)=>y===year&&m===pm));}
  function monthAgg(m){return aggregate(entriesIn((y,mm)=>y===year&&mm===m));}

  function renderPills(){const cm=new Date().getMonth();const t=monthAgg(cm);document.getElementById("pillIn").textContent=fmtNum(t.inc);document.getElementById("pillOut").textContent=fmtNum(t.exp);const ne=document.getElementById("pillNet");ne.textContent=fmtNum(t.net);ne.className="pv mono "+(t.net>=0?"pos":"neg");}

  function renderCats(){const g=document.getElementById("catGrid");g.innerHTML=CATS.map(c=>`<button class="cat ${selCat===c.id?'sel':''}" data-id="${c.id}"><svg viewBox="0 0 24 24">${c.icon}</svg><span class="cn">${c.name}</span></button>`).join("");g.querySelectorAll(".cat").forEach(b=>b.addEventListener("click",()=>{selCat=selCat===b.dataset.id?"":b.dataset.id;renderCats();const c=catById(selCat);document.getElementById("controlLabel").textContent=c?c.name:"Categoria e descrição";}));}

  /* ===== DASHBOARD ===== */
  function renderDashboard(){
    document.getElementById("dashScopeName").textContent=scope==="year"?year:MONTHS_FULL[scopeMonth].toLowerCase();
    document.getElementById("monthNav").style.visibility=scope==="year"?"hidden":"visible";
    document.getElementById("scopeLabel").textContent=MONTHS_FULL[scopeMonth]+" "+year;
    const sc=document.getElementById("dashScroll");const d=scopeData();
    if(d.inc===0&&d.exp===0){sc.innerHTML='<div class="empty">Nada lançado neste período.<br>Comece pela tela inicial.</div>';return;}
    sc.innerHTML=heroHTML(d)+rankSectionHTML(d)+summaryHTML(d)+reserveHTML()+trendHTML()+heatHTML()+sheetHTML();
    const rt=document.getElementById("rankToggle");if(rt)rt.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{rankMode=b.dataset.m;renderDashboard();}));
    wireHeatCells();
    requestAnimationFrame(()=>document.querySelectorAll(".rank-bar,.pace-fill,.tb").forEach(b=>{if(b.dataset.w)b.style.width=b.dataset.w;if(b.dataset.h)b.style.height=b.dataset.h;}));
  }

  function heroHTML(d){
    const isYear=scope==="year";const today=new Date();
    let elapsed,total,dayLabel;
    if(isYear){const soy=new Date(year,0,1);const ref=(year===today.getFullYear())?today:new Date(year,11,31);elapsed=Math.max(1,Math.round((ref-soy)/86400000)+1);total=daysInYear(year);dayLabel="por dia (ano)";}
    else{total=daysInMonth(scopeMonth);elapsed=(year===today.getFullYear()&&scopeMonth===today.getMonth())?today.getDate():total;dayLabel="por dia";}
    const burn=d.exp/elapsed;const budget=isYear?settings.salary*12:settings.salary;const projected=burn*total;
    const pacePct=budget>0?Math.min(140,projected/budget*100):0;
    const level=projected<=budget*(settings.essenciais+settings.desejos)/100?"green":projected<=budget?"yellow":"red";
    const lc=level==="green"?"var(--green)":level==="yellow"?"var(--yellow)":"var(--red)";
    const savings=d.inc>0?((d.inc-d.exp)/d.inc*100):0;
    const markerPos=projected>budget?Math.min(100,100/(projected/budget)):100;
    return `<div class="hero"><div class="hero-grid">
      <div class="hero-cell hero-main">
        <div class="hl">Gasto ${dayLabel}</div>
        <div class="hv">${fmtShort(burn)}</div>
        <div class="hs">Projeção do período: <span class="mono">${fmtShort(projected)}</span> de <span class="mono">${fmtShort(budget)}</span></div>
        <div class="pace-track"><div class="pace-fill" data-w="${Math.min(100,pacePct)}%" style="width:0;background:${lc}"></div>${projected>budget?`<div class="pace-marker" style="left:${markerPos}%"></div>`:''}</div>
      </div>
      <div class="hero-cell"><div class="hl">Saldo</div><div class="hv" style="color:${d.net>=0?'var(--green)':'var(--red)'}">${fmtShort(d.net)}</div><div class="hs">${fmtShort(d.inc)} entrou · ${fmtShort(d.exp)} saiu</div></div>
      <div class="hero-cell"><div class="hl">Taxa de poupança</div><div class="hv" style="color:${savings>=20?'var(--green)':savings>=0?'var(--yellow)':'var(--red)'}">${savings.toFixed(0)}<span class="u">%</span></div><div class="hs">do que entrou, sobrou</div></div>
    </div></div>`;
  }

  function rankSectionHTML(d){
    const prev=prevScopeData();const src=rankMode==="cat"?d.byCat:d.byGroup;const prevSrc=rankMode==="cat"?prev.byCat:prev.byGroup;
    let items=Object.keys(src).map(k=>({k,v:src[k]})).sort((a,b)=>b.v-a.v);
    const max=items.length?items[0].v:1;const total=d.exp||1;
    const rows=items.map((it,i)=>{
      let name,icon;if(rankMode==="cat"){const c=catById(it.k);name=c?c.name:"Outros";icon=c?c.icon:'';}else{name=it.k;icon='';}
      const pct=(it.v/total*100);const prevV=prevSrc[it.k]||0;let delta="";
      if(prevV>0){const ch=(it.v-prevV)/prevV*100;if(Math.abs(ch)>=5)delta=`<span class="rank-delta ${ch>0?'up':'down'}">${ch>0?'▲':'▼'}${Math.abs(ch).toFixed(0)}%</span>`;}
      else if(it.v>0)delta=`<span class="rank-delta up">novo</span>`;
      return `<div class="rank-row ${i===0?'top':''}"><div class="rank-line"><span class="rank-name">${icon?`<span class="ri"><svg viewBox="0 0 24 24">${icon}</svg></span>`:''}${name}${delta}</span><span class="rank-val">${fmtShort(it.v)}<span class="pct">${pct.toFixed(0)}%</span></span></div><div class="rank-track"><div class="rank-bar" data-w="${(it.v/max*100).toFixed(1)}%" style="width:0"></div></div></div>`;
    }).join("");
    const topName=items.length?(rankMode==="cat"?(catById(items[0].k)||{name:"Outros"}).name:items[0].k):"—";
    return `<div class="sec-h"><span class="st">Para onde foi</span><span class="seg-mini" id="rankToggle"><button data-m="cat" class="${rankMode==='cat'?'active':''}">Categoria</button><button data-m="group" class="${rankMode==='group'?'active':''}">Grupo</button></span></div>
    ${items.length?`<div class="ms" style="margin:-4px 0 12px">Maior peso: <b style="color:var(--text)">${topName}</b>${items.length>1?` — concentra ${(items[0].v/total*100).toFixed(0)}% das saídas`:''}.</div>`:''}
    ${rows||'<div class="ms">Sem saídas categorizadas.</div>'}`;
  }

  function summaryHTML(d){
    const groups=["Essenciais","Desejos","Investimentos"];const vals=groups.map(g=>d.byGroup[g]||0);const tot=vals.reduce((a,b)=>a+b,0)||1;
    const R=34,C=2*Math.PI*R;let off=0;const colors=["var(--sage-d)","var(--neg)","var(--sage-bright)"];
    const segs=vals.map((v,i)=>{const len=v/tot*C;const el=`<circle cx="40" cy="40" r="${R}" fill="none" stroke="${colors[i]}" stroke-width="8" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 40 40)"/>`;off+=len;return el;}).join("");
    const invPct=(vals[2]/tot*100);
    return `<div class="sec-h"><span class="st">Equilíbrio</span><span class="sx">${scope==='year'?'no ano':'no mês'}</span></div>
    <div class="summary"><svg width="80" height="80" viewBox="0 0 80 80">${segs}</svg><div class="summary-txt"><div class="stt">Investimentos</div><div class="sv" style="color:${invPct>=20?'var(--green)':'var(--yellow)'}">${invPct.toFixed(0)}%</div><div class="ss">${groups.map((g,i)=>`<span style="color:${colors[i]}">●</span> ${g} ${(vals[i]/tot*100).toFixed(0)}%`).join(" &nbsp; ")}</div></div></div>`;
  }

  function reserveHTML(){
    // reserva acumulada no ano = soma dos lançamentos de saída categoria "reserva" (aportes)
    const reserveEntries=entriesIn(y=>y===year).filter(e=>e.type==="out"&&e.cat==="reserva");
    const reserveTotal=reserveEntries.reduce((s,e)=>s+e.amount,0);
    // meses ativos e aporte médio
    const activeMonths=new Set();let totalExp=0,expMonths={};
    entriesIn(y=>y===year).forEach(e=>{if(e.type==="out"){totalExp+=e.amount;expMonths[e._m]=(expMonths[e._m]||0)+e.amount;activeMonths.add(e._m);}});
    const nMonths=Math.max(1,Object.keys(expMonths).length);
    const avgMonthlyExp=totalExp/nMonths;
    // meta de reserva = 6x gasto mensal médio (padrão de reserva de emergência)
    const target=avgMonthlyExp*6;
    // aporte mensal médio à reserva
    const reserveMonthsActive=new Set(reserveEntries.map(e=>e._m)).size||1;
    const monthlyAport=reserveTotal/reserveMonthsActive;
    // runway: quantos meses a reserva atual cobre se a renda parar
    const runway=avgMonthlyExp>0?reserveTotal/avgMonthlyExp:0;
    // break-even: meses até atingir a meta no ritmo de aporte
    const remaining=Math.max(0,target-reserveTotal);
    const monthsToTarget=monthlyAport>0?remaining/monthlyAport:Infinity;
    const pctOfTarget=target>0?Math.min(100,reserveTotal/target*100):0;

    if(reserveTotal===0&&avgMonthlyExp===0)return "";

    // chart: linha de acúmulo projetada até a meta (até 24 meses)
    const W=300,H=120,padL=8,padR=8,padT=10,padB=18;
    const horizon=Math.min(24,Math.max(6,Math.ceil(isFinite(monthsToTarget)?monthsToTarget+2:12)));
    const maxY=Math.max(target,reserveTotal+monthlyAport*horizon,1);
    function X(m){return padL+(W-padL-padR)*(m/horizon);}
    function Y(v){return padT+(H-padT-padB)*(1-v/maxY);}
    // linha já realizada (0 -> hoje) e projetada (hoje -> meta)
    const monthsElapsed=reserveMonthsActive;
    let pts=[];for(let m=0;m<=horizon;m++){const val=Math.min(maxY,reserveTotal+monthlyAport*m);pts.push([X(m),Y(val)]);}
    const linePath=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    const areaPath=linePath+` L ${X(horizon).toFixed(1)} ${Y(0).toFixed(1)} L ${X(0).toFixed(1)} ${Y(0).toFixed(1)} Z`;
    const targetY=Y(target);
    // break-even point
    const beX=isFinite(monthsToTarget)?X(Math.min(horizon,monthsToTarget)):null;
    const beY=targetY;

    const beLabel=isFinite(monthsToTarget)?(monthsToTarget<1?"menos de 1 mês":monthsToTarget<12?`${Math.ceil(monthsToTarget)} meses`:`${(monthsToTarget/12).toFixed(1)} anos`):"sem aporte ainda";
    const runwayLabel=runway<1?"menos de 1 mês":`${runway.toFixed(1)} ${runway>=2?'meses':'mês'}`;
    const runwayLevel=runway>=6?"green":runway>=3?"yellow":"red";
    const rlc=runwayLevel==="green"?"var(--green)":runwayLevel==="yellow"?"var(--yellow)":"var(--red)";

    return `<div class="sec-h"><span class="st">Reserva de emergência</span><span class="sx">âncora p/ investir</span></div>
    <div class="reserve">
      <div class="reserve-top">
        <div><div class="rt-l">Acumulado</div><div class="rt-v">${fmtShort(reserveTotal)}</div><div class="rt-s">de ${fmtShort(target)} (meta 6×)</div></div>
        <div style="text-align:right"><div class="rt-l">Cobre se a renda parar</div><div class="rt-v" style="color:${rlc}">${runwayLabel}</div><div class="rt-s">no seu ritmo de gasto</div></div>
      </div>
      <svg class="reserve-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs><linearGradient id="resg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--sage)" stop-opacity="0.28"/><stop offset="1" stop-color="var(--sage)" stop-opacity="0"/></linearGradient></defs>

  function showDayDetail(dd){

  function heatHTML(){

  }

  function sheetHTML(){
    let rows="",any=false;
    for(let m=0;m<12;m++){const t=monthAgg(m);if(t.inc||t.exp)any=true;const saf=monthSafetyLevel(t.exp);const tint=(t.inc||t.exp)?("tint-"+saf):"";const lc=saf==="green"?"var(--green)":saf==="yellow"?"var(--yellow)":"var(--red)";rows+=`<tr class="${tint}"><td>${MONTHS_FULL[m]}<span class="dot" style="background:${(t.inc||t.exp)?lc:'transparent'}"></span></td><td style="color:var(--sage)">${t.inc?fmtShort(t.inc):'–'}</td><td style="color:var(--neg)">${t.exp?fmtShort(t.exp):'–'}</td><td style="color:${t.net>=0?'var(--green)':'var(--red)'};font-weight:600">${(t.inc||t.exp)?fmtShort(t.net):'–'}</td></tr>`;}

  function monthSafetyLevel(exp){if(settings.salary<=0)return "green";const sp=exp/settings.salary*100;const green=settings.essenciais+settings.desejos;return sp<=green?"green":sp<=100?"yellow":"red";}

  function renderSettings(){

    s.innerHTML=`<div class="set-field"><div class="lh">Salário de referência</div><input type="number" id="setSalary" value="${settings.salary}" step="100"><div class="ms" style="margin-top:8px">Base do gasto diário e do pace. Use um valor conservador se sua renda varia.</div></div>

    <div class="set-field"><div class="lh">Estética do fundo</div>${aesSlider("dotSpacing","Espaçamento",10,40,1)}${aesSlider("dotSize","Tamanho do ponto",0.5,4,0.1)}${aesSlider("dotOpacity","Opacidade",0.05,0.8,0.01)}${aesSlider("waveIntensity","Força da onda",0,30,1)}${aesSlider("waveRadius","Alcance da onda",80,400,10)}${aesSlider("noise","Dithering",0,0.2,0.005)}</div>`;
    document.getElementById("setSalary").addEventListener("input",e=>{settings.salary=parseFloat(e.target.value)||0;saveSettings();});

    [["dotSpacing",0],["dotSize",1],["dotOpacity",2],["waveIntensity",0],["waveRadius",0],["noise",3]].forEach(([k,dec])=>{const el=document.getElementById("aes_"+k);if(!el)return;el.addEventListener("input",e=>{settings[k]=parseFloat(e.target.value);document.getElementById("aesv_"+k).textContent=fmtAes(settings[k],dec);saveSettings();if(k==="dotSpacing")initMesh();if(k==="noise")buildNoise();syncGrid();if(reduceMotion)drawStatic();});});
    updateMetaWarn();
  }
  function metaSlider(id,name,icon){return `<div class="slider-row"><span class="sn"><svg viewBox="0 0 24 24">${icon}</svg>${name}</span><input type="range" id="rng_${id}" min="0" max="100" value="${settings[id]}"><span class="sval" id="val_${id}">${settings[id]}%</span></div>`;}
  function fmtAes(v,dec){return dec===0?String(Math.round(v)):v.toFixed(dec);}
  function aesSlider(k,name,min,max,step){const dec=step<1?(String(step).split(".")[1]||"").length:0;return `<div class="slider-row"><span class="sn">${name}</span><input type="range" id="aes_${k}" min="${min}" max="${max}" step="${step}" value="${settings[k]}"><span class="sval" id="aesv_${k}">${fmtAes(settings[k],dec)}</span></div>`;}
  function updateMetaWarn(){const sum=settings.essenciais+settings.desejos+settings.investimentos;document.getElementById("sumPill").textContent="Soma: "+sum+"%"+(sum!==100?" (ideal: 100%)":" ✓");const w=document.getElementById("metaWarn");let h="";if(sum!==100)h+=`<div class="meta-warn warn">As fatias somam ${sum}%. Ajuste para fechar 100%.</div>`;if(settings.investimentos<10)h+=`<div class="meta-warn bad">Investir abaixo de 10% é conservador demais — como autônomo, isso pesa na aposentadoria.</div>`;else if(settings.investimentos>=30)h+=`<div class="meta-warn ok">Meta de ${settings.investimentos}% em investimentos é excelente.</div>`;if(settings.essenciais>60)h+=`<div class="meta-warn bad">Essenciais acima de 60% deixa pouca folga.</div>`;if(settings.desejos>40)h+=`<div class="meta-warn warn">Desejos acima de 40% pode comprometer a poupança.</div>`;if(!h)h=`<div class="meta-warn ok">Divisão equilibrada.</div>`;w.innerHTML=h;}

  /* ===== OVERLAY morph ===== */
  function innerOf(p){return p.querySelector(".panel-inner");}
  function openOv(bId,pId,trig){const bd=document.getElementById(bId),p=document.getElementById(pId),inner=innerOf(p);bd.classList.add("open");p.classList.add("open");if(reduceMotion){p.style.transition="none";p.style.transform="none";p.style.opacity="1";if(inner)inner.style.opacity="1";return;}p.style.transition="none";p.style.transform="none";p.style.opacity="1";p.style.borderRadius="28px";const pr=p.getBoundingClientRect();const tr=trig?trig.getBoundingClientRect():{left:innerWidth-60,top:18,width:44,height:44};const sx=tr.width/pr.width,sy=tr.height/pr.height,tx=tr.left-pr.left,ty=tr.top-pr.top;p.style.transformOrigin="top left";p.style.transform=`translate(${tx}px,${ty}px) scale(${sx},${sy})`;p.style.opacity="0.5";p.style.borderRadius="14px";if(inner)inner.style.opacity="0";p.getBoundingClientRect();requestAnimationFrame(()=>{p.style.transition="";p.style.transform="translate(0,0) scale(1)";p.style.opacity="1";p.style.borderRadius="28px";if(inner)inner.style.opacity="1";});}
  function closeOv(bId,pId,trig){const bd=document.getElementById(bId),p=document.getElementById(pId),inner=innerOf(p);bd.classList.remove("open");if(reduceMotion){p.classList.remove("open");p.style.opacity="0";if(inner)inner.style.opacity="0";return;}const pr=p.getBoundingClientRect();const tr=trig?trig.getBoundingClientRect():{left:innerWidth-60,top:18,width:44,height:44};const sx=tr.width/pr.width,sy=tr.height/pr.height,tx=tr.left-pr.left,ty=tr.top-pr.top;if(inner)inner.style.opacity="0";p.style.transition="";p.style.transform=`translate(${tx}px,${ty}px) scale(${sx},${sy})`;p.style.opacity="0";p.style.borderRadius="14px";const done=ev=>{if(ev.propertyName!=="transform")return;p.classList.remove("open");p.style.transition="none";p.style.transform="none";p.style.borderRadius="28px";p.removeEventListener("transitionend",done);};p.addEventListener("transitionend",done);}

  /* ===== FRACTAL GRID ===== */
  const cv=document.getElementById("mesh");const ctx=cv.getContext("2d",{alpha:false});
  const reduceMotion=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const GRID={dotSize:1.6,dotSpacing:22,dotOpacity:0.34,waveIntensity:9,waveRadius:230,gradientDur:10000,noise:0.05};
  function syncGrid(){GRID.dotSize=settings.dotSize;GRID.dotSpacing=settings.dotSpacing;GRID.dotOpacity=settings.dotOpacity;GRID.waveIntensity=settings.waveIntensity;GRID.waveRadius=settings.waveRadius;GRID.noise=settings.noise;}
  const SAGE={r:150,g:172,b:160},NEG={r:207,g:148,b:136};
  let gw=0,gh=0,cols=0,rows=0,DPR=1,waves=[],pointer={x:-9999,y:-9999,active:false},noiseTile=null;
  function initMesh(){DPR=Math.min(devicePixelRatio||1,2);gw=innerWidth;gh=innerHeight;cv.width=gw*DPR;cv.height=gh*DPR;cv.style.width=gw+"px";cv.style.height=gh+"px";ctx.setTransform(DPR,0,0,DPR,0,0);cols=Math.ceil(gw/GRID.dotSpacing)+1;rows=Math.ceil(gh/GRID.dotSpacing)+1;buildNoise();}
  function buildNoise(){const s=90,off=document.createElement("canvas");off.width=s;off.height=s;const o=off.getContext("2d"),img=o.createImageData(s,s);for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=Math.random()*255*GRID.noise;}o.putImageData(img,0,0);noiseTile=off;}
  function triggerWave(type){waves.push({x:gw/2,y:gh*0.42,t:performance.now(),type});if(waves.length>6)waves.shift();}
  function setPointer(e){const p=e.touches?e.touches[0]:e;pointer.x=p.clientX;pointer.y=p.clientY;pointer.active=true;}
  function clearPointer(){pointer.active=false;pointer.x=-9999;pointer.y=-9999;}
  addEventListener("mousemove",setPointer,{passive:true});addEventListener("mouseleave",clearPointer);addEventListener("touchstart",setPointer,{passive:true});addEventListener("touchmove",setPointer,{passive:true});addEventListener("touchend",clearPointer);
  function drawMesh(now){now=now||performance.now();const t=(now%GRID.gradientDur)/GRID.gradientDur,ang=t*Math.PI*2;const gx=gw*(0.5+0.32*Math.cos(ang)),gy=gh*(0.5+0.32*Math.sin(ang*0.8));ctx.fillStyle="#0c0f0e";ctx.fillRect(0,0,gw,gh);const bg=ctx.createRadialGradient(gx,gy,0,gx,gy,Math.max(gw,gh)*0.9);bg.addColorStop(0,`rgba(${SAGE.r},${SAGE.g},${SAGE.b},0.09)`);bg.addColorStop(0.5,`rgba(${SAGE.r},${SAGE.g},${SAGE.b},0.03)`);bg.addColorStop(1,"rgba(12,15,14,0)");ctx.fillStyle=bg;ctx.fillRect(0,0,gw,gh);const WLIFE=1500;waves=waves.filter(w=>now-w.t<WLIFE);for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const bx=c*GRID.dotSpacing,by=r*GRID.dotSpacing;let dx=0,dy=0,glow=0,tn=0;for(const w of waves){const age=(now-w.t)/WLIFE,front=age*GRID.waveRadius*2.6,ddx=bx-w.x,ddy=by-w.y,dist=Math.sqrt(ddx*ddx+ddy*ddy),band=Math.abs(dist-front);if(band<GRID.waveRadius){const infl=(1-band/GRID.waveRadius)*(1-age),push=infl*GRID.waveIntensity;if(dist>0){dx+=ddx/dist*push;dy+=ddy/dist*push;}glow+=infl;if(w.type==="out")tn+=infl;}}if(pointer.active){const pdx=bx-pointer.x,pdy=by-pointer.y,pd=Math.sqrt(pdx*pdx+pdy*pdy);if(pd<150)glow+=(1-pd/150)*0.6;}const op=Math.min(0.95,GRID.dotOpacity+glow*0.6),size=GRID.dotSize+glow*1.6,mix=Math.min(1,tn);const cr=Math.round(SAGE.r+(NEG.r-SAGE.r)*mix),cg=Math.round(SAGE.g+(NEG.g-SAGE.g)*mix),cb=Math.round(SAGE.b+(NEG.b-SAGE.b)*mix);ctx.fillStyle=`rgba(${cr},${cg},${cb},${op})`;ctx.fillRect(bx+dx-size/2,by+dy-size/2,size,size);}if(noiseTile){ctx.globalCompositeOperation="screen";ctx.fillStyle=ctx.createPattern(noiseTile,"repeat");ctx.fillRect(0,0,gw,gh);ctx.globalCompositeOperation="source-over";}requestAnimationFrame(drawMesh);}
  function drawStatic(){ctx.fillStyle="#0c0f0e";ctx.fillRect(0,0,gw,gh);for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ctx.fillStyle=`rgba(${SAGE.r},${SAGE.g},${SAGE.b},${GRID.dotOpacity})`;ctx.fillRect(c*GRID.dotSpacing-GRID.dotSize/2,r*GRID.dotSpacing-GRID.dotSize/2,GRID.dotSize,GRID.dotSize);}}

  /* ===== backup ===== */
  function exportData(){const payload={year,data,settings,exportedAt:new Date().toISOString()};const b=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="fluxo_"+year+".json";a.click();URL.revokeObjectURL(u);}
  function exportCSV(){
    // monta uma linha por lançamento, ordenado por data
    const rows=[];
    for(const k in data){const p=k.split("-").map(Number);data[k].forEach(e=>rows.push({y:p[0],m:p[1],d:p[2],e}));}
    rows.sort((a,b)=>(a.m-b.m)||(a.d-b.d));
    function esc(v){v=String(v==null?"":v);if(/[";\n]/.test(v))return '"'+v.replace(/"/g,'""')+'"';return v;}
    const sep=";"; // separador pt-BR (Excel Brasil usa ; e vírgula decimal)
    const header=["Data","Tipo","Categoria","Descrição","Valor"].join(sep);
    const lines=rows.map(r=>{
      const c=catById(r.e.cat);
      const dateStr=String(r.d).padStart(2,"0")+"/"+String(r.m+1).padStart(2,"0")+"/"+r.y;
      const tipo=r.e.type==="in"?"Entrada":"Saída";
      const valor=(r.e.type==="in"?"":"-")+r.e.amount.toFixed(2).replace(".",","); // vírgula decimal
      return [dateStr,tipo,c?c.name:(r.e.cat||""),r.e.desc||"",valor].map(esc).join(sep);
    });
    const csv="\uFEFF"+[header].concat(lines).join("\r\n"); // BOM p/ acentos no Excel
    const b=new Blob([csv],{type:"text/csv;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="fluxo_"+year+".csv";a.click();URL.revokeObjectURL(u);
  }
  function importData(file){const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result);if(p.data){if(confirm("Importar backup"+(p.year?" de "+p.year:"")+"? Substitui os dados atuais.")){if(p.year)year=p.year;data=p.data;if(p.settings)settings=Object.assign(settings,p.settings);save();saveSettings();renderPills();renderDashboard();flash("importado");}}else alert("Arquivo inválido.");}catch(e){alert("Não consegui ler o arquivo.");}};r.readAsText(file);}

  document.querySelectorAll("#scopeToggle button").forEach(b=>b.addEventListener("click",()=>{scope=b.dataset.scope;document.querySelectorAll("#scopeToggle button").forEach(x=>x.classList.toggle("active",x===b));renderDashboard();}));
  document.getElementById("scopePrev").addEventListener("click",()=>{scopeMonth=(scopeMonth+11)%12;renderDashboard();});
  document.getElementById("scopeNext").addEventListener("click",()=>{scopeMonth=(scopeMonth+1)%12;renderDashboard();});
  document.getElementById("openSettings").addEventListener("click",e=>{renderSettings();openOv("setBackdrop","setPanel",e.currentTarget);});
  document.getElementById("closeSet").addEventListener("click",()=>{closeOv("setBackdrop","setPanel",document.getElementById("openSettings"));renderPills();initMesh();syncGrid();if(reduceMotion)drawStatic();});
  document.getElementById("setBackdrop").addEventListener("click",()=>{closeOv("setBackdrop","setPanel",document.getElementById("openSettings"));renderPills();});
  addEventListener("resize",()=>{initMesh();if(reduceMotion)drawStatic();});

  /* ===== init ===== */
  load();syncGrid();initMesh();
  if(reduceMotion)drawStatic();else requestAnimationFrame(drawMesh);
  renderCats();renderPills();
  document.getElementById("bigInput").focus();
})();
</script>
</body>
</html>
